<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragon Warrior Portal</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <h1 class="title">Dragon Warrior Portal</h1>
      <p class="subtitle">Only the true warrior may enter</p>

      <form class="login-form" method="POST" action="/login">
        <div class="input-group">
          <label for="username">Warrior Name</label>
          <input type="text" id="username" name="username" required>
        </div>

        <div class="input-group">
          <label for="password">Sacred Password</label>
          <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="login-btn">Enter</button>

        {% if error %}
          <p class="message">{{ error }}</p>
        {% else %}
          <p class="message"></p>
        {% endif %}
      </form>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script src="{{ url_for('static', filename='js/unused.js') }}"></script>
</body>
</html>
